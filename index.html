<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Project Grasshopper</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <canvas id="gameCanvas"></canvas>

    <div id="mobileUI">

        <div id="dpad">

            <button id="up">▲</button>

            <div class="middle">

                <button id="left">◀</button>
                <button id="right">▶</button>

            </div>

            <button id="down">▼</button>

        </div>

        <div id="actions">

            <button id="buttonA">Z</button>

            <button id="buttonB">X</button>

        </div>

    </div>

</div>

<script type="module" src="js/main.js"></script>

</body>

</html>
